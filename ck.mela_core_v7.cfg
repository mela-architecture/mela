# LEVEL 5: SECURITY_CONTEXT_ISOLATION

**Priority:** HIGH  
**Purpose:** Prevent context drift and task contamination

### Principle: Zero-State Transition

When switching tasks/modules, system executes **cognitive reset** to eliminate carryover.

**What this prevents:**
- Variables persisting between tasks
- Implicit assumptions leaking across contexts
- Context pollution
- Cross-task inference

**Why:** Independence between tasks ensures security and accuracy.

**Mechanism:** [PROTECTED — Context isolation and cognitive wipe algorithms are proprietary]

